<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC Contact Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="profile">
    <!-- EDIT: Replace profile.png with your profile image -->
    <img src="assets/images/profile.png" class="profile-pic" alt="Profile picture">
    <h1>Your Name</h1> <!-- EDIT: Put your name -->
    <p>Your Title / Tagline</p> <!-- EDIT: optional subtitle -->
  </div>

  <div class="grid">
    <div class="card" onclick="toggleCard('phone')">
      <img src="assets/icons/phone.png" alt="Phone">
      <p>Phone</p>
    </div>

    <div class="card" onclick="toggleCard('email')">
      <img src="assets/icons/email.png" alt="Email">
      <p>Email</p>
    </div>

    <div class="card" onclick="toggleCard('resume')">
      <img src="assets/icons/resume.png" alt="Resume">
      <p>Resume</p>
    </div>

    <div class="card" onclick="toggleCard('linkedin')">
      <img src="assets/icons/linkedin.png" alt="LinkedIn">
      <p>LinkedIn</p>
    </div>

    <div class="card" onclick="toggleCard('contact')">
      <img src="assets/icons/contact.png" alt="Save Contact">
      <p>Save Contact</p>
    </div>

    <div class="card" onclick="toggleCard('venmo')">
      <img src="assets/icons/venmo.png" alt="Venmo">
      <p>Venmo</p>
    </div>
  </div>

  <div id="dropdown-container"></div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
