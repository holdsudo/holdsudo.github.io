<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Joseph's Contact</title>
  <meta name="description" content="Let's get in contact." />
  <meta name="theme-color" content="#080808" />
  <meta name="msapplication-TileColor" content="#080808" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Joseph's Contact" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="canonical" href="https://holdsudo.github.io/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Joseph's Contact" />
  <meta property="og:description" content="Let's get in contact." />
  <meta property="og:url" content="https://holdsudo.github.io/" />
  <meta property="og:image" content="https://holdsudo.github.io/social-preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Joseph's Contact preview image" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Joseph's Contact" />
  <meta name="twitter:description" content="Let's get in contact." />
  <meta name="twitter:image" content="https://holdsudo.github.io/social-preview.png" />
  <meta name="twitter:image:alt" content="Joseph's Contact preview image" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-panel">
      <div class="hero-copy">
        <p class="eyebrow">Professional contact card</p>
        <h1>Joseph</h1>
        <p class="subtitle">Connect with me</p>
      </div>
      <div class="hero-portrait-wrap">
        <img
          class="hero-portrait"
          src="https://media.licdn.com/dms/image/v2/D4E03AQH5lB0NqQjiXQ/profile-displayphoto-scale_400_400/B4EZyD2E84KoAg-/0/1771738527800?e=2147483647&v=beta&t=yOZecGqHxf_kvsenrc9y_4HXejyQi6s-pFJ07TuYgK0"
          alt="Joseph profile photo"
        />
      </div>
    </section>

    <section class="card-section" aria-labelledby="connect-title">
      <div class="section-heading">
        <h2 id="connect-title">Connect</h2>
        <p>Direct links for profile, documents, and contact details.</p>
      </div>
      <div class="card-grid" id="card-grid"></div>
    </section>

    <a
      class="github-link"
      href="https://github.com/holdsudo"
      target="_blank"
      rel="noopener noreferrer"
    >
      Check out my GitHub
    </a>
  </main>

  <template id="card-template">
    <button class="contact-card" type="button">
      <div class="card-icon" aria-hidden="true"></div>
      <div class="card-copy">
        <h3 class="card-title"></h3>
        <p class="card-subtitle"></p>
      </div>
      <span class="card-action">Open</span>
    </button>
  </template>

  <div id="modal-backdrop" class="modal-backdrop hidden"></div>

  <div
    id="action-modal"
    class="action-modal hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <button id="modal-close" class="modal-close" aria-label="Close" type="button">&times;</button>

    <div class="modal-top">
      <div id="modal-icon-wrap" class="modal-icon-wrap"></div>
      <div class="modal-copy">
        <p id="modal-kicker" class="modal-kicker"></p>
        <h2 id="modal-title" class="modal-title"></h2>
        <p id="modal-description" class="modal-description"></p>
      </div>
    </div>

    <div id="modal-preview" class="modal-preview hidden"></div>

    <div id="modal-actions" class="modal-actions"></div>

    <div id="resume-gate" class="resume-gate hidden">
      <label class="gate-label" for="resume-password">Enter password</label>
      <div class="gate-row">
        <input
          id="resume-password"
          class="gate-input"
          type="password"
          placeholder="Password"
          autocomplete="off"
        />
        <button id="resume-submit" class="action-btn primary-action" type="button">Unlock</button>
      </div>
      <p id="resume-error" class="resume-error hidden">Incorrect password.</p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
